name: Deno

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: Verify formatting
        run: deno fmt --check

      - name: Verify linting
        run: deno lint

      - name: Verify types
        run: deno check src/cli.ts

      - name: Build
        run: |
          mkdir -p dist
          deno task compile:x86_64
          deno task compile:aarch64

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
