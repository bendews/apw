name: Deno fmt and lint check

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: Verify formatting
        run: deno fmt --check

      - name: Verify linting
        run: deno lint

      - name: Verify types
        run: deno check src/cli.ts
